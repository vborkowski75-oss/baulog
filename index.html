<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bau-App Pro - Bremenports Edition</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #003a66; --accent: #d71920; --success: #27ae60; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.15); max-width: 480px; margin: auto; }
        
        /* Header mit Logo rechts */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logo { max-height: 50px; width: auto; }
        
        #weather-display { font-size: 0.9rem; color: #555; background: #f9f9f9; padding: 8px; border-radius: 8px; margin-bottom: 15px; border-left: 4px solid var(--primary); text-align: left; }

        #video-container { width: 100%; height: 260px; border-radius: 12px; overflow: hidden; background: #000; margin-bottom: 10px; border: 1px solid #ccc; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #photo-preview { width: 100%; height: 260px; border-radius: 12px; object-fit: cover; display: none; border: 3px solid var(--primary); }

        .controls { display: flex; justify-content: space-around; margin: 20px 0; }
        .btn-round { border: none; border-radius: 50%; width: 70px; height: 70px; font-size: 1.8rem; cursor: pointer; color: white; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        #micBtn { background: var(--accent); }
        #camBtn { background: var(--primary); }
        .active { animation: pulse 1.2s infinite; filter: contrast(1.5); }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }

        textarea { width: 100%; border-radius: 10px; border: 1px solid #ccc; padding: 12px; font-size: 1rem; box-sizing: border-box; margin-top: 10px; }
        
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .btn-long { border: none; border-radius: 8px; padding: 15px; font-weight: bold; cursor: pointer; color: white; }
        #saveBtn { background: var(--success); }
        #pdfBtn { background: #34495e; }

        /* PDF & Liste */
        #report-area { margin-top: 25px; max-width: 480px; margin-left: auto; margin-right: auto; }
        .entry { background: white; padding: 12px; border-radius: 10px; margin-bottom: 12px; display: flex; gap: 12px; align-items: flex-start; border: 1px solid #eee; }
        .entry img { width: 90px; height: 90px; object-fit: cover; border-radius: 6px; }
        .entry-info { flex: 1; font-size: 0.9rem; }
        .entry-date { font-size: 0.75rem; color: #777; margin-bottom: 4px; }
        
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="card no-print">
    <div class="header">
        <h2 style="margin:0; color: var(--primary);">Bau-Log</h2>
        <img src="bremenports Logo klein.jpg" class="logo" alt="bremenports" onerror="this.style.display='none'">
    </div>

    <div id="weather-display">Wetter wird geladen...</div>
    
    <div id="video-container"><video id="video" autoplay playsinline></video></div>
    <img id="photo-preview">

    <div class="controls">
        <button id="micBtn" class="btn-round" onclick="startVoice()">🎤</button>
        <button id="camBtn" class="btn-round" onclick="snap()">📸</button>
    </div>

    <textarea id="note" rows="3" placeholder="Sprechen oder tippen..."></textarea>
    
    <div class="action-grid">
        <button id="saveBtn" class="btn-long" onclick="save()">💾 Speichern</button>
        <button id="pdfBtn" class="btn-long" onclick="exportPDF()">📄 PDF Export</button>
    </div>
</div>

<div id="report-area">
    <div id="log-entries"></div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
let recognition;
let pic = null;
let currentWetter = "Wetter nicht verfügbar";

window.onload = async () => {
    // Wetter ohne API Key abrufen
    fetch('https://wttr.in/?format=%l:+%C+%t')
        .then(response => response.text())
        .then(data => {
            currentWetter = data;
            document.getElementById('weather-display').innerText = "📍 " + data;
        })
        .catch(() => document.getElementById('weather-display').innerText = "Wetterdaten nicht erreichbar");

    try {
        const s = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('video').srcObject = s;
    } catch(e) { alert("Kamera-Zugriff verweigert."); }
    render();
};

function startVoice() {
    const SR = window.webkitSpeechRecognition || window.SpeechRecognition;
    if(!SR) return alert("Mikrofon-Dienst nicht verfügbar.");
    if(!recognition) {
        recognition = new SR();
        recognition.lang = 'de-DE';
        recognition.onstart = () => document.getElementById('micBtn').classList.add('active');
        recognition.onend = () => document.getElementById('micBtn').classList.remove('active');
        recognition.onresult = (e) => document.getElementById('note').value = e.results[0][0].transcript;
    }
    recognition.start();
}

function snap() {
    const v = document.getElementById('video');
    const c = document.getElementById('canvas');
    c.width = v.videoWidth; c.height = v.videoHeight;
    c.getContext('2d').drawImage(v, 0, 0);
    pic = c.toDataURL('image/jpeg', 0.6);
    document.getElementById('photo-preview').src = pic;
    document.getElementById('photo-preview').style.display = 'block';
    document.getElementById('video-container').style.display = 'none';
}

function save() {
    const text = document.getElementById('note').value;
    const data = JSON.parse(localStorage.getItem('bau_v3') || '[]');
    data.unshift({ 
        id: Date.now(), text, pic, wetter: currentWetter,
        ts: new Date().toLocaleString('de-DE') 
    });
    localStorage.setItem('bau_v3', JSON.stringify(data));
    
    // Reset
    document.getElementById('note').value = '';
    document.getElementById('photo-preview').style.display = 'none';
    document.getElementById('video-container').style.display = 'block';
    pic = null;
    render();
}

function render() {
    const container = document.getElementById('log-entries');
    const data = JSON.parse(localStorage.getItem('bau_v3') || '[]');
    container.innerHTML = data.map(i => `
        <div class="entry">
            <img src="${i.pic || ''}" style="background:#eee">
            <div class="entry-info">
                <div class="entry-date">${i.ts}</div>
                <div style="font-size:0.7rem; color:var(--primary); margin-bottom:5px;">🌤 ${i.wetter}</div>
                <strong>${i.text}</strong>
            </div>
        </div>
    `).join('');
}

function exportPDF() {
    const element = document.getElementById('report-area');
    const opt = {
        margin: 10,
        filename: 'Bautagebuch_Export.pdf',
        html2canvas: { scale: 2 },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };
    html2pdf().set(opt).from(element).save();
}
// Service Worker registrieren für Offline-Modus
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js')
    .then(() => console.log("Offline-Modus aktiv!"))
    .catch((err) => console.log("ServiceWorker Fehler:", err));
}
</script>
</body>
</html>
