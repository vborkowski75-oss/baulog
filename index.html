<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bau-Log Profi - bremenports</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #003a66; --accent: #d71920; --bg: #f4f7f6; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
        
        /* Header mit Logo oben rechts */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logo { max-height: 40px; width: auto; }

        #video-container { width: 100%; height: 250px; background: #000; border-radius: 10px; overflow: hidden; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #photo-preview { width: 100%; height: 250px; object-fit: cover; display: none; border-radius: 10px; border: 3px solid var(--primary); }

        .controls { display: flex; justify-content: space-around; margin: 20px 0; }
        .btn-round { border: none; border-radius: 50%; width: 70px; height: 70px; font-size: 1.8rem; cursor: pointer; color: white; background: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        #micBtn { background: var(--accent); }
        .active { animation: pulse 1s infinite; filter: brightness(1.2); }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        textarea { width: 100%; border: 1px solid #ccc; padding: 15px; border-radius: 8px; font-size: 1.1rem; box-sizing: border-box; margin-bottom: 15px; }
        .btn-long { width: 100%; border: none; padding: 18px; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; font-size: 1.1rem; margin-bottom: 10px; }
        #saveBtn { background: #27ae60; }
        #pdfBtn { background: #34495e; }

        /* PDF LAYOUT (Wird nur beim Export sichtbar) */
        #report-area { background: white; padding: 30px; color: black; display: none; }
        .pdf-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--primary); padding-bottom: 10px; margin-bottom: 20px; }
        .pdf-entry { border-bottom: 1px solid #eee; padding: 20px 0; display: flex; gap: 20px; page-break-inside: avoid; }
        .pdf-entry img { width: 180px; height: 180px; object-fit: cover; border-radius: 5px; }
        .pdf-date { font-size: 0.9rem; color: #666; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="card no-print">
    <div class="header">
        <h2 style="margin:0; color:var(--primary);">Bau-Log</h2>
        <img src="bremenports Logo klein.jpg" class="logo" alt="Logo">
    </div>

    <div id="video-container"><video id="video" autoplay playsinline></video></div>
    <img id="photo-preview" src="">

    <div class="controls">
        <button id="micBtn" class="btn-round" title="Diktieren" onclick="toggleSpeech()">🎤</button>
        <button id="camBtn" class="btn-round" title="Foto machen" onclick="snap()">📸</button>
    </div>

    <textarea id="note" rows="3" placeholder="Notiz hier dritieren oder tippen..."></textarea>
    
    <button id="saveBtn" class="btn-long" onclick="save()">💾 Eintrag speichern</button>
    <button id="pdfBtn" class="btn-long" onclick="exportPDF()">📄 PDF Bericht erstellen</button>
</div>

<div id="report-area">
    <div class="pdf-header">
        <div>
            <h1 style="margin:0; color:#003a66;">Bautagebuch</h1>
            <p id="pdf-gen-date" style="margin:0; color:#666;"></p>
        </div>
        <img src="bremenports Logo klein.jpg" class="logo">
    </div>
    <div id="pdf-content"></div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
let recognition;
let picData = null;
const DB_NAME = 'baulog_data_v1';

window.onload = async () => {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        document.getElementById('video').srcObject = stream;
    } catch(e) { console.error("Kamera nicht bereit"); }
    render();
};

function toggleSpeech() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) return alert("Browser unterstützt kein Mikrofon.");
    
    if (!recognition) {
        recognition = new SpeechRecognition();
        recognition.lang = 'de-DE';
        recognition.continuous = false;
        recognition.onstart = () => document.getElementById('micBtn').classList.add('active');
        recognition.onend = () => document.getElementById('micBtn').classList.remove('active');
        recognition.onresult = (e) => {
            document.getElementById('note').value += e.results[0][0].transcript;
        };
    }
    recognition.start();
}

function snap() {
    const v = document.getElementById('video');
    const c = document.getElementById('canvas');
    c.width = v.videoWidth; c.height = v.videoHeight;
    c.getContext('2d').drawImage(v, 0, 0);
    picData = c.toDataURL('image/jpeg', 0.8);
    document.getElementById('photo-preview').src = picData;
    document.getElementById('photo-preview').style.display = 'block';
    document.getElementById('video-container').style.display = 'none';
}

function save() {
    const text = document.getElementById('note').value;
    if (!text && !picData) return alert("Bitte Text oder Foto hinzufügen!");

    const entry = {
        id: Date.now(),
        date: new Date().toLocaleString('de-DE', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' }),
        text: text,
        image: picData
    };

    const data = JSON.parse(localStorage.getItem(DB_NAME) || '[]');
    data.unshift(entry);
    localStorage.setItem(DB_NAME, JSON.stringify(data));

    // Reset
    document.getElementById('note').value = '';
    document.getElementById('photo-preview').style.display = 'none';
    document.getElementById('video-container').style.display = 'block';
    picData = null;
    alert("Gespeichert!");
    render();
}

function render() {
    const data = JSON.parse(localStorage.getItem(DB_NAME) || '[]');
    const container = document.getElementById('pdf-content');
    
    if(data.length === 0) {
        container.innerHTML = "<p>Keine Einträge vorhanden.</p>";
        return;
    }

    container.innerHTML = data.map(item => `
        <div class="pdf-entry">
            ${item.image ? `<img src="${item.image}">` : '<div style="width:180px; height:100px; background:#eee; display:flex; align-items:center; justify-content:center; color:#999;">Kein Foto</div>'}
            <div>
                <div class="pdf-date">${item.date}</div>
                <div style="font-size:1.1rem; line-height:1.4;">${item.text.replace(/\n/g, '<br>')}</div>
            </div>
        </div>
    `).join('');
}

function exportPDF() {
    const element = document.getElementById('report-area');
    document.getElementById('pdf-gen-date').innerText = "Erstellt am: " + new Date().toLocaleDateString();
    
    element.style.display = 'block'; // Für Export sichtbar machen

    const opt = {
        margin: [10, 10],
        filename: 'bremenports_Bautagebuch.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true, logging: false },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
    };

    html2pdf().set(opt).from(element).save().then(() => {
        element.style.display = 'none'; // Danach wieder verstecken
    });
}

// Offline-Fähigkeit
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js');
}
</script>
</body>
</html>
